<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CSV_VALIDATOR_V1.0</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; height: 100vh; display: grid; place-items: center;
        font-family: ui-sans-serif, -apple-system, system-ui, sans-serif;
        background: #0d1512; color: #e7efe9;
      }
      .card {
        width: 70%; max-width: 520px; padding: 48px 32px; text-align: center;
        border: 1px dashed #2c3a33; border-radius: 16px; background: #101a16;
      }
      .ring {
        width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 50%;
        border: 1px dashed #3ddc97; display: grid; place-items: center; font-size: 26px;
      }
      h1 { font-size: 20px; margin: 0 0 6px; }
      p { margin: 0 0 24px; color: #8aa399; font-size: 13px; }
      button {
        background: #3ddc97; color: #06241a; border: 0; border-radius: 8px;
        padding: 12px 22px; font-weight: 600; font-size: 14px; cursor: pointer;
      }
      .live { margin-top: 22px; font-size: 11px; color: #5f7a6f; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ring">☁️</div>
      <h1>Upload your CSV</h1>
      <p>Drag and drop or click to browse files</p>
      <button id="go">Begin Validation</button>
      <div class="live" id="clock"></div>
    </div>
    <script>
      // A tiny bit of live behavior so we can confirm the embedded app is genuinely
      // running (not a static screenshot) when we pan/zoom it on the parent canvas.
      const clock = document.getElementById("clock");
      setInterval(() => { clock.textContent = "live • " + new Date().toLocaleTimeString(); }, 1000);
      document.getElementById("go").addEventListener("click", () => {
        document.getElementById("go").textContent = "Validating…";
      });
    </script>
  </body>
</html>
